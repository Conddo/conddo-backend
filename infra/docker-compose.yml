name: conddo

services:
  postgres:
    image: postgres:16-alpine
    container_name: conddo-postgres
    environment:
      # The migration / owner role. Flyway connects as this user.
      POSTGRES_DB: ${CONDDO_DB_NAME:-conddo}
      POSTGRES_USER: ${CONDDO_DB_OWNER:-conddo_owner}
      POSTGRES_PASSWORD: ${CONDDO_DB_OWNER_PASSWORD:-owner_password}
      # Passed through to the init script that creates the runtime app role.
      APP_DB_USER: ${CONDDO_DB_APP_USER:-app_user}
      APP_DB_PASSWORD: ${CONDDO_DB_APP_PASSWORD:-app_password}
    ports:
      - "${CONDDO_DB_PORT:-5432}:5432"
    volumes:
      - conddo_pgdata:/var/lib/postgresql/data
      # *.sql / *.sh in this dir run once, on first cluster init, as POSTGRES_USER.
      - ./postgres/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${CONDDO_DB_OWNER:-conddo_owner} -d ${CONDDO_DB_NAME:-conddo}"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: conddo-redis
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "${CONDDO_REDIS_PORT:-6379}:6379"
    volumes:
      - conddo_redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
    restart: unless-stopped

  minio:
    image: minio/minio:latest
    container_name: conddo-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${CONDDO_MINIO_USER:-conddo}
      MINIO_ROOT_PASSWORD: ${CONDDO_MINIO_PASSWORD:-conddo_secret_change_me}
    ports:
      - "${CONDDO_MINIO_PORT:-9000}:9000"      # S3 API
      - "${CONDDO_MINIO_CONSOLE_PORT:-9001}:9001"  # Web console
    volumes:
      - conddo_miniodata:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

volumes:
  conddo_pgdata:
  conddo_redisdata:
  conddo_miniodata:
