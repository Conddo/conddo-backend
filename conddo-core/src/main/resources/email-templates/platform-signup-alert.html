<!DOCTYPE html>
<html lang="en" xmlns="http://www.w3.org/1999/xhtml" xmlns:v="urn:schemas-microsoft-com:vml" xmlns:o="urn:schemas-microsoft-com:office:office">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta http-equiv="X-UA-Compatible" content="IE=edge" />
  <meta name="color-scheme" content="light" />
  <meta name="supported-color-schemes" content="light" />
  <title>New signup — {{BUSINESS_NAME}}</title>
  <!--[if mso]><style>* { font-family: Arial, sans-serif !important; }</style><![endif]-->
</head>
<body style="margin:0; padding:0; background-color:#F4F3F0; -webkit-font-smoothing:antialiased;">
  <div style="display:none; max-height:0; overflow:hidden; mso-hide:all; font-size:1px; line-height:1px; color:#F4F3F0;">
    {{BUSINESS_NAME}} just signed up on Conddo.&zwnj;&nbsp;&zwnj;&nbsp;&zwnj;&nbsp;
  </div>

  <table role="presentation" width="100%" cellpadding="0" cellspacing="0" style="background-color:#F4F3F0;">
    <tr>
      <td align="center" style="padding:40px 16px;">
        <table role="presentation" width="600" cellpadding="0" cellspacing="0" style="width:600px; max-width:600px;">

          <tr>
            <td align="left" style="padding:4px 8px 24px;">
              <img src="{{LOGO_URL}}" alt="conddo.io" height="28" style="height:28px; width:auto; border:0; display:block;" />
            </td>
          </tr>

          <tr>
            <td style="background-color:#FFFFFF; border:1px solid #ECEAE6; border-radius:14px; padding:40px;">
              <table role="presentation" width="100%" cellpadding="0" cellspacing="0">
                <tr>
                  <td style="font-family:'Inter',-apple-system,'Segoe UI',Roboto,Helvetica,Arial,sans-serif; color:#8A8A8A; font-size:11px; font-weight:600; text-transform:uppercase; letter-spacing:0.05em; padding-bottom:6px;">
                    New signup
                  </td>
                </tr>
                <tr>
                  <td style="font-family:'Inter',-apple-system,'Segoe UI',Roboto,Helvetica,Arial,sans-serif; color:#141414; font-size:22px; font-weight:600; letter-spacing:-0.01em; padding-bottom:10px;">
                    {{BUSINESS_NAME}} just joined
                  </td>
                </tr>

                <tr>
                  <td style="padding:16px 0 24px;">
                    <table role="presentation" width="100%" cellpadding="0" cellspacing="0" style="background-color:#FAF9F7; border:1px solid #ECEAE6; border-radius:12px;">
                      <tr>
                        <td style="font-family:'Inter',-apple-system,'Segoe UI',Roboto,Helvetica,Arial,sans-serif; color:#565656; font-size:13px; line-height:22px; padding:14px 18px;">
                          <span style="color:#8A8A8A;">Owner</span>&nbsp;&nbsp;<strong style="color:#141414;">{{OWNER_NAME}}</strong>
                          &nbsp;&middot;&nbsp;<a href="mailto:{{OWNER_EMAIL}}" style="color:#7C5CBF; text-decoration:none;">{{OWNER_EMAIL}}</a>
                        </td>
                      </tr>
                      <tr>
                        <td style="font-family:'Inter',-apple-system,'Segoe UI',Roboto,Helvetica,Arial,sans-serif; color:#565656; font-size:13px; line-height:22px; padding:0 18px 6px;">
                          <span style="color:#8A8A8A;">Vertical</span>&nbsp;&nbsp;<strong style="color:#141414;">{{VERTICAL}}</strong>
                          &nbsp;&middot;&nbsp;<span style="color:#8A8A8A;">Plan</span>&nbsp;&nbsp;<strong style="color:#141414;">{{PLAN}}</strong>
                        </td>
                      </tr>
                      <tr>
                        <td style="font-family:'Inter',-apple-system,'Segoe UI',Roboto,Helvetica,Arial,sans-serif; color:#565656; font-size:13px; line-height:22px; padding:0 18px 14px;">
                          <span style="color:#8A8A8A;">Workspace</span>&nbsp;&nbsp;<strong style="color:#141414;">{{WORKSPACE_URL}}</strong>
                        </td>
                      </tr>
                    </table>
                  </td>
                </tr>

                <tr>
                  <td align="left" style="padding-bottom:8px;">
                    <!--[if mso]>
                    <v:roundrect xmlns:v="urn:schemas-microsoft-com:vml" xmlns:w="urn:schemas-microsoft-com:office:word" href="{{ADMIN_URL}}" style="height:48px;v-text-anchor:middle;width:220px;" arcsize="22%" stroke="f" fillcolor="#7C5CBF">
                      <w:anchorlock/>
                      <center style="color:#ffffff;font-family:Arial,sans-serif;font-size:15px;font-weight:bold;">Open in Studio</center>
                    </v:roundrect>
                    <![endif]-->
                    <!--[if !mso]><!-- -->
                    <a href="{{ADMIN_URL}}" style="display:inline-block; background-color:#7C5CBF; color:#FFFFFF; font-family:'Inter',-apple-system,'Segoe UI',Roboto,Helvetica,Arial,sans-serif; font-size:15px; font-weight:600; text-decoration:none; padding:14px 28px; border-radius:10px;">Open in Studio</a>
                    <!--<![endif]-->
                  </td>
                </tr>
              </table>
            </td>
          </tr>

          <tr>
            <td style="padding:24px 8px 0;">
              <p style="margin:0; font-family:'Inter',-apple-system,'Segoe UI',Roboto,Helvetica,Arial,sans-serif; color:#9A9A9A; font-size:12px; line-height:18px;">
                Conddo.io &mdash; internal platform notification.
              </p>
            </td>
          </tr>

        </table>
      </td>
    </tr>
  </table>
</body>
</html>
