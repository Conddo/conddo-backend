name: Release · lean

# Builds the runtime Docker image and pushes to GHCR as :lean.
# Trigger manually from the Actions tab, or automatically on push to main.
# EC2 pulls this tag via `docker compose pull` in /opt/conddo.

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "conddo-core/**"
      - "conddo-api/**"
      - "pom.xml"
      - "Dockerfile"
      - ".github/workflows/release-lean.yml"

concurrency:
  group: release-lean
  cancel-in-progress: true

jobs:
  build-and-push:
    name: Build + push ghcr.io/conddo/conddo-backend:lean
    runs-on: ubuntu-latest
    timeout-minutes: 25
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          platforms: linux/amd64
          tags: |
            ghcr.io/conddo/conddo-backend:lean
            ghcr.io/conddo/conddo-backend:sha-${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
