spring:
  application:
    name: conddo

  # Runtime datasource — connects as the NON-owner app role so RLS applies.
  datasource:
    url: ${CONDDO_DB_URL:jdbc:postgresql://localhost:5432/conddo}
    username: ${CONDDO_DB_APP_USER:app_user}
    password: ${CONDDO_DB_APP_PASSWORD:app_password}
    hikari:
      maximum-pool-size: 10
      pool-name: conddo-app-pool
      connection-timeout: 30000
      connection-test-query: SELECT 1

  jpa:
    hibernate:
      ddl-auto: validate          # schema is owned by Flyway, never by Hibernate
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
        jdbc:
          time_zone: UTC

  # Migrations run as the OWNER role; app.tenant_id GUC and RLS are set up here.
  flyway:
    enabled: true
    url: ${CONDDO_DB_URL:jdbc:postgresql://localhost:5432/conddo}
    user: ${CONDDO_DB_OWNER:conddo_owner}
    password: ${CONDDO_DB_OWNER_PASSWORD:owner_password}
    placeholders:
      app_role: ${CONDDO_DB_APP_USER:app_user}
    connect-retries: 10
    connect-retries-interval: 10s

  data:
    redis:
      host: ${CONDDO_REDIS_HOST:localhost}
      port: ${CONDDO_REDIS_PORT:6379}

  # Media upload limits (§11.12). Keep max-file-size aligned with conddo.media.max-bytes.
  servlet:
    multipart:
      max-file-size: ${CONDDO_MEDIA_MAX_FILE_SIZE:10MB}
      max-request-size: ${CONDDO_MEDIA_MAX_REQUEST_SIZE:12MB}

conddo:
  # Base domain for subdomain→tenant resolution (businessname.getconddo.com). Set
  # CONDDO_BASE_DOMAIN once the domain + wildcard DNS are pointed at the service.
  base-domain: ${CONDDO_BASE_DOMAIN:getconddo.com}
  signup:
    # Seed a small set of sample customers / products / orders on TenantActivated
    # for Fashion + Pharmacy tenants — keeps the dashboard from feeling empty
    # on day one. Tests override this to false.
    seed-sample-data: ${CONDDO_SIGNUP_SEED_SAMPLE_DATA:true}

  # Media storage via Cloudinary (§11.12). Upload returns a permanent, public,
  # CDN-backed secure_url (embedded in the dashboard, public website + emails).
  cloudinary:
    # cloudinary://<api_key>:<api_secret>@<cloud_name> — from the Cloudinary dashboard.
    # Blank → uploads return 502 until configured.
    url: ${CLOUDINARY_URL:}

  # Media library.
  media:
    max-bytes: ${CONDDO_MEDIA_MAX_BYTES:10485760}    # 10 MB; align with multipart max-file-size

  # AI text generation. Two paths, picked at runtime:
  #   - OpenRouter (preferred): unified gateway to DeepSeek / Claude /
  #     Gemini / etc. via OpenAI-compatible endpoint. Cheapest per token
  #     at scale; provider swap-by-env-var.
  #   - Anthropic direct: legacy path, kept for Pharmacy AI Product
  #     Assistant's vision calls until we route those through OpenRouter
  #     with a vision-capable model.
  # When both are configured, OpenRouter wins @Primary; Anthropic stops
  # registering (Pharmacy vision should switch to a vision model on
  # OpenRouter, e.g. anthropic/claude-3.5-sonnet).
  openrouter:
    base-url: ${CONDDO_OPENROUTER_BASE_URL:https://openrouter.ai/api/v1}
    api-key: ${CONDDO_OPENROUTER_API_KEY:}
    model: ${CONDDO_OPENROUTER_MODEL:deepseek/deepseek-chat}
    max-tokens: ${CONDDO_OPENROUTER_MAX_TOKENS:1024}
    referer: ${CONDDO_OPENROUTER_REFERER:https://getconddo.com}
    app-title: ${CONDDO_OPENROUTER_APP_TITLE:Conddo}
    # Per-action model overrides (see AiModelSelector). Any left blank falls
    # back to the global `model` above. Pick from any OpenRouter model slug.
    #
    # Classifier + brief default to DeepSeek V3.1 free — structured-JSON
    # tool-selection at zero marginal cost. If OpenRouter's free tier is
    # rate-limited on a hot day the caller sees a clean AI_SUGGESTION_FAILED
    # and can retry; that's a better failure mode than silently billing.
    model-classifier: ${CONDDO_OPENROUTER_MODEL_CLASSIFIER:deepseek/deepseek-chat-v3.1:free}
    model-website:    ${CONDDO_OPENROUTER_MODEL_WEBSITE:}
    model-marketing:  ${CONDDO_OPENROUTER_MODEL_MARKETING:}
    model-brief:      ${CONDDO_OPENROUTER_MODEL_BRIEF:deepseek/deepseek-chat-v3.1:free}
  anthropic:
    base-url: ${CONDDO_ANTHROPIC_BASE_URL:https://api.anthropic.com}
    api-key: ${CONDDO_ANTHROPIC_API_KEY:}
    model: ${CONDDO_ANTHROPIC_MODEL:claude-sonnet-4-6}
    max-tokens: ${CONDDO_ANTHROPIC_MAX_TOKENS:1024}

  # NVIDIA NIM (build.nvidia.com) — OpenAI-compatible endpoint. Used by
  # CreditedAiGateway for the signup classifier path so onboarding doesn't
  # burn OpenRouter credits for a pre-tenant call. Fully optional: set
  # CONDDO_NVIDIA_API_KEY to enable; unset it and the router silently
  # sends every call to OpenRouter as before.
  #
  # Default model is Llama 3.1 Nemotron 70B — strong at structured-JSON
  # classification, free on the current NIM tier. Override with
  # CONDDO_NVIDIA_MODEL if NVIDIA renames or deprecates.
  nvidia:
    base-url: ${CONDDO_NVIDIA_BASE_URL:https://integrate.api.nvidia.com/v1}
    api-key: ${CONDDO_NVIDIA_API_KEY:}
    model: ${CONDDO_NVIDIA_MODEL:nvidia/llama-3.1-nemotron-70b-instruct}
    max-tokens: ${CONDDO_NVIDIA_MAX_TOKENS:1024}

  # Notification channels (PRD §6.4). provider 'log' = stub (the default).
  # SMS via Brevo (set provider=brevo + CONDDO_BREVO_API_KEY); email via Resend
  # (set provider=resend + CONDDO_RESEND_API_KEY + a verified CONDDO_EMAIL_FROM).
  notifications:
    sms:
      # log (stub) | brevo | termii
      provider: ${CONDDO_SMS_PROVIDER:log}
      base-url: ${CONDDO_SMS_BASE_URL:https://api.brevo.com}
      api-key: ${CONDDO_BREVO_API_KEY:${CONDDO_TERMII_API_KEY:}}
      sender-id: ${CONDDO_SMS_SENDER_ID:Conddo}
    email:
      # log (stub) | brevo | resend.  Brevo (preferred): free tier delivers to any
      # recipient (300/day) with just a verified sender — no domain needed. Resend
      # without a verified domain only delivers to your own account email.
      provider: ${CONDDO_EMAIL_PROVIDER:log}
      # Empty → each adapter uses its own default (Brevo api.brevo.com / Resend api.resend.com).
      base-url: ${CONDDO_EMAIL_BASE_URL:}
      # Brevo and Resend each use one API key; Brevo shares CONDDO_BREVO_API_KEY with SMS.
      api-key: ${CONDDO_EMAIL_API_KEY:${CONDDO_BREVO_API_KEY:${CONDDO_RESEND_API_KEY:}}}
      from: ${CONDDO_EMAIL_FROM:no-reply@getconddo.com}
      from-name: ${CONDDO_EMAIL_FROM_NAME:Conddo}
      # Public logo URL embedded in the branded HTML email templates.
      logo-url: ${CONDDO_EMAIL_LOGO_URL:}

  security:
    # Access-token signing (RSA-256). Local default = generated dev key pair on
    # the classpath (conddo-api/src/main/resources/keys, gitignored). Production
    # overrides CONDDO_JWT_* to point at mounted key files.
    jwt:
      public-key: ${CONDDO_JWT_PUBLIC_KEY:classpath:keys/dev_public.pem}
      private-key: ${CONDDO_JWT_PRIVATE_KEY:classpath:keys/dev_private.pem}
      issuer: ${CONDDO_JWT_ISSUER:https://getconddo.com}
      access-ttl: ${CONDDO_JWT_ACCESS_TTL:15m}
    # Authentication tunables (refresh-token lifetime, lockout, cookie flags).
    auth:
      refresh-token-ttl: ${CONDDO_REFRESH_TTL:30d}
      lockout-threshold: ${CONDDO_LOCKOUT_THRESHOLD:5}
      lockout-base-duration: ${CONDDO_LOCKOUT_BASE:15m}
      cookie-secure: ${CONDDO_AUTH_COOKIE_SECURE:true}
      # Strict for same-site (e.g. app.conddo.io + api.conddo.io). For a
      # cross-site frontend (Vercel) calling a different-domain API, set None
      # (with cookie-secure true) so the browser sends the refresh cookie.
      cookie-same-site: ${CONDDO_AUTH_COOKIE_SAMESITE:Strict}
      password-reset-ttl: ${CONDDO_PWD_RESET_TTL:1h}
      # When true (default) /auth/register/complete requires the OTP step first.
      # Set false to defer verification to a post-onboarding email link — the
      # new low-friction onboarding flow.
      require-otp-verify: ${CONDDO_REQUIRE_OTP_VERIFY:true}

    # Browser origins allowed to call the API.
    #   allowed-origins         — exact origins, comma-separated (CONDDO_CORS_ALLOWED_ORIGINS).
    #   allowed-origin-patterns — wildcard patterns, comma-separated (CONDDO_CORS_ALLOWED_ORIGIN_PATTERNS),
    #                             e.g. "https://*.conddo.io,https://*.vercel.app" — required
    #                             for tenant subdomains and Vercel preview URLs.
    # Wildcard "*" alone is intentionally disallowed (incompatible with allowCredentials=true).
    cors:
      allowed-origins: ${CONDDO_CORS_ALLOWED_ORIGINS:http://localhost:3000}
      allowed-origin-patterns: ${CONDDO_CORS_ALLOWED_ORIGIN_PATTERNS:}

    # Signup phone-verification OTP. A 4-digit code is low entropy, so the
    # attempt/expiry/resend limits are the real defence.
    otp:
      code-length: ${CONDDO_OTP_LENGTH:4}
      ttl: ${CONDDO_OTP_TTL:10m}
      max-attempts: ${CONDDO_OTP_MAX_ATTEMPTS:5}
      resend-cooldown: ${CONDDO_OTP_RESEND_COOLDOWN:30s}
      max-resends: ${CONDDO_OTP_MAX_RESENDS:5}

    # Google Sign-in (ACTION_LIST §1a) — OAuth client id from Google Cloud Console
    # → APIs & Services → Credentials. Blank → /auth/google + /auth/register/start-google
    # return 400 GOOGLE_ID_TOKEN_INVALID (the dormant verifier rejects every token),
    # so the FE buttons surface a clean error rather than crashing the boot.
    # No client secret is required — this is ID-token verify only (no auth-code flow).
    oauth:
      google:
        client-id: ${GOOGLE_OAUTH_CLIENT_ID:}

# Conddo Studio (Production plane) hand-off — see SERVICE_TOPOLOGY.md §4. When both
# base-url and service-token are set, an owner website change-request creates a Studio
# job; otherwise the request is recorded PENDING for manual pickup. The token is the
# shared secret Studio checks on its /api/jobs/intake endpoint (X-Studio-Service-Token).
studio:
  base-url: ${STUDIO_BASE_URL:}
  service-token: ${STUDIO_SERVICE_TOKEN:}

# Service-to-service link to conddo-payments (ACTION_LIST §7a). Same shape as
# the Studio one above: TenantActivationListener calls payments to provision
# the RoutePay sub-account on signup. Both values blank → the hand-off is a
# no-op (signup still succeeds; provisioning runs manually later).
payments:
  base-url: ${PAYMENTS_BASE_URL:}
  service-token: ${PAYMENTS_SERVICE_TOKEN:}

server:
  # Honour the platform-provided PORT (Render/Heroku) first, then our own var.
  port: ${PORT:${CONDDO_API_PORT:8080}}

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-components: always
  health:
    # OFF by default: Redis isn't provisioned yet (Phase 1 item 2), and a missing
    # optional dependency must not make /actuator/health report DOWN — that would
    # fail the Render health check and keep the deploy from going Live. Once Redis
    # is provisioned, set CONDDO_REDIS_HEALTH_ENABLED=true to re-enable the probe.
    redis:
      enabled: ${CONDDO_REDIS_HEALTH_ENABLED:false}
